apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-html-config
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>Welcome to Kubernetes</title>
        <style>
            body { font-family: sans-serif; text-align: center; margin-top: 10%; background-color: #f4f4f9; }
            h1 { color: #326ce5; }
        </style>
    </head>
    <body>
        <h1>Hello from Kubernetes!</h1>
        <p>This default page is served directly from a ConfigMap.</p>
    </body>
    </html>
