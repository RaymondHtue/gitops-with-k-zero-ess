apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - httproute.yaml

configMapGenerator:
  - name: nginx-default-page
    files:
      - index.html=nginx-default-page/index.html

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: nginx
      app.kubernetes.io/part-of: gitops-with-k-zero-ess

# Image is set by environment overlays (see overlays/*/kustomization.yaml).
# Base image 'nginx' is a placeholder; each overlay must override it.
