apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-http
spec:
  hostnames:
    - "nginx.example.com"
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: shared-gateway
    namespace: nginx-gateway
    sectionName: http
  rules:
    - backendRefs:
      - group: ''
        kind: Service
        name: nginx
        port: 80
        weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
