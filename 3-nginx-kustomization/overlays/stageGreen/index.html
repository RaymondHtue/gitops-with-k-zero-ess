<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitOps with K-Zero-Ess</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1b5e20 0%, #388e3c 100%);
      color: #ffffff;
    }
    .container {
      text-align: center;
      padding: 3rem;
      border-radius: 1rem;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    .env-badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      background: rgba(255,255,255,0.2);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    p {
      margin-top: 0.5rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>gitops-with-k-zero-ess</h1>
    <div class="env-badge">STAGE - GREEN</div>
    <p>Kustomize &middot; Nginx</p>
  </div>
</body>
</html>
