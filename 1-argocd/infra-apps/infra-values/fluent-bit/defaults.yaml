# values-fluent-bit.yaml
livenessProbe:
  httpGet:
    path: /
    port: http

readinessProbe:
  httpGet:
    path: /api/v1/health
    port: http

config:
  service: |
    [SERVICE]
        Daemon       Off
        Flush        1
        Log_Level    info
        Parsers_File parsers.conf
        Parsers_File custom_parsers.conf
        # This is the critical part for the probes to work:
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020
        Health_Check On
  inputs: |
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            docker
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     100MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off
        Buffer_Size   0

  outputs: |
    [OUTPUT]
        Name                   loki
        Match                  kube.*
        Host                   loki.visibleone.app
        Port                   443
        TLS                    on
        TLS.Verify             on
        # HTTP_User              ${LOKI_USER}
        # HTTP_Passwd            ${LOKI_PASSWORD}
        # Add a static label to identify this specific cluster
        Labels                 job=hkbn-k8s-cluster,cluster="raymond-gke-cluster"
        # Automatically converts k8s metadata (namespace, pod) into Loki labels
        Auto_Kubernetes_Labels on

