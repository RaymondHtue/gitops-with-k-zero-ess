apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: nginx-gateway-l2-policy
spec:
  interfaces:
    - ^eth[0-9]+
    - ^ens[0-9]+
  loadBalancerIPs: true
  nodeSelector:
    matchExpressions:
      - key: node-role.kubernetes.io/control-plane
        operator: DoesNotExist
  # serviceSelector intentionally omitted — applies to all LoadBalancer services
